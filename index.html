<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌀</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TurbineBloom — Interactive VAWT Designer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
    <!-- Apply saved theme before React mounts to avoid flash -->
    <script>
      try {
        const s = JSON.parse(localStorage.getItem('turbine-theme') || '{}')
        if (s.state?.theme === 'light') document.documentElement.classList.add('light')
      } catch (_) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
